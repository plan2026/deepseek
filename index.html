<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار التميز الاستراتيجي | Strategic Planning Excellence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: linear-gradient(145deg, #1a3a5f 0%, #2c5f9e 50%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: #fff; border-radius: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); width: 100%; max-width: 900px; padding: 30px; border: 1px solid #d4b483; }
        h1 { color: #1a3a5f; text-align: center; font-size: 28px; margin-bottom: 5px; }
        .subtitle { color: #8b6b4d; text-align: center; margin-bottom: 20px; font-size: 16px; border-bottom: 2px solid #d4b483; padding-bottom: 15px; }
        .stats-bar { display: flex; justify-content: space-between; background: #f0f5fb; padding: 12px 20px; border-radius: 50px; margin-bottom: 20px; border: 1px solid #1a3a5f; font-weight: 600; color: #1a3a5f; }
        .progress-container { width: 100%; height: 10px; background: #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: #4a90e2; width: 0%; transition: 0.3s; }
        .question-card { background: #fff; border-radius: 20px; padding: 20px; border-right: 6px solid #1a3a5f; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .question-text { font-size: 18px; color: #1a3a5f; margin-bottom: 20px; font-weight: 600; line-height: 1.6; }
        .options-grid { display: grid; gap: 10px; }
        .option { background: #f8fafd; border: 2px solid #e1e8f0; border-radius: 12px; padding: 12px 15px; cursor: pointer; transition: 0.2s; font-weight: 500; text-align: right; }
        .option:hover { border-color: #1a3a5f; background: #edf4fc; }
        .option.correct { background: #d4edda; border-color: #28a745; color: #155724; }
        .option.incorrect { background: #f8d7da; border-color: #dc3545; color: #721c24; }
        .explanation-box { background: #fff9e6; border: 1px solid #ffeeba; padding: 15px; border-radius: 12px; margin-top: 15px; display: none; font-size: 15px; line-height: 1.6; }
        .treatment-tag { display: inline-block; background: #1a3a5f; color: white; padding: 4px 10px; border-radius: 6px; font-size: 13px; margin-top: 8px; }
        .btn-next { background: #1a3a5f; color: white; padding: 12px 30px; border-radius: 50px; border: none; cursor: pointer; font-weight: 600; margin-top: 20px; float: left; }
        .btn-next:disabled { background: #ccc; cursor: not-allowed; }
        #results { text-align: center; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 اختبار التميز الاستراتيجي</h1>
        <div class="subtitle">Strategic Planning & Policy Excellence Test</div>
        
        <div id="quiz-section">
            <div class="stats-bar">
                <div>السؤال: <span id="current-idx">1</span> / <span id="total-count">0</span></div>
                <div>النتيجة: <span id="score">0</span></div>
            </div>
            <div class="progress-container"><div class="progress-bar" id="progress"></div></div>
            <div id="quiz-content"></div>
            <button class="btn-next" id="nextBtn" onclick="handleNext()" disabled>السؤال التالي ←</button>
        </div>

        <div id="results">
            <h2 style="color: #1a3a5f;">التحليل النهائي للأداء</h2>
            <div style="font-size: 50px; color: #8b6b4d; margin: 20px 0;" id="final-score">0</div>
            <p id="final-msg" style="margin-bottom: 20px;"></p>
            <button class="btn-next" onclick="location.reload()" style="float:none">إعادة الاختبار</button>
        </div>
    </div>

    <script>
        const rawQuestions = [
            { text: "كتبت إدارة التخطيط الخطة وحدها دون إشراك الإدارات الأخرى. ما النتيجة المتوقعة؟", options: ["ضعف التملك المؤسسي للخطة", "زيادة الابتكار", "زيادة التمويل", "تسريع التنفيذ"], correct: 0, explanation: "التخطيط التشاركي يزيد الالتزام بالتنفيذ.", characteristics: "مقاومة داخلية، ضعف الالتزام.", treatment: "تنظيم ورش تخطيط تشاركية." },
            { text: "وضعت مؤسسة أهدافاً طموحة جداً دون تقييم الموارد المتاحة. ما المشكلة؟", options: ["غياب الواقعية في التخطيط", "زيادة الابتكار", "ضعف المشاركة", "ضعف المؤشرات"], correct: 0, explanation: "الاستراتيجية يجب أن توازن بين الطموح والموارد.", characteristics: "فجوة بين الطموح والقدرة.", treatment: "تحليل الموارد قبل اعتماد الأهداف." },
            { text: "ورد في الخطة هدف بعنوان (تحسين الخدمات الحكومية) دون مؤشر رقمي. ما الخلل؟", options: ["غياب قابلية القياس", "زيادة المرونة", "زيادة الابتكار", "زيادة التمويل"], correct: 0, explanation: "الأهداف يجب أن تكون قابلة للقياس عبر مؤشرات أداء.", characteristics: "أهداف عامة، صعوبة التقييم.", treatment: "تحويل الهدف إلى مؤشر رقمي واضح." },
            { text: "لم تتضمن الخطة أي تحليل للمخاطر المستقبلية. ما المشكلة؟", options: ["غياب إدارة المخاطر", "زيادة الطموح", "ضعف الموارد", "زيادة الابتكار"], correct: 0, explanation: "إدارة المخاطر تساعد المؤسسات على الاستعداد للتغيرات.", characteristics: "مفاجآت غير متوقعة، ضعف المرونة.", treatment: "إدراج سجل للمخاطر الاستراتيجية." },
            { text: "لم يتم تحديد مسؤول عن تحقيق كل هدف في الخطة. ما المشكلة؟", options: ["غياب المساءلة", "زيادة الابتكار", "زيادة الموارد", "زيادة المرونة"], correct: 0, explanation: "كل هدف استراتيجي يجب أن يكون له مالك مسؤول.", characteristics: "غياب المسؤولية، تشتت التنفيذ.", treatment: "تحديد Owner لكل هدف." },
            { text: "اقترح فريق التخطيط نفس الحلول القديمة لمشكلة مزمنة. ما المبدأ غير المطبق؟", options: ["مبدأ الابتكار", "مبدأ القياس", "مبدأ المشاركة", "مبدأ الواقعية"], correct: 0, explanation: "التخطيط الحديث يتطلب حلولاً مبتكرة.", characteristics: "تكرار السياسات، ضعف الإبداع.", treatment: "تشجيع التفكير الابتكاري." },
            { text: "الأهداف المؤسسية لا تتوافق مع الأهداف القطاعية. ما المشكلة؟", options: ["ضعف المواءمة الاستراتيجية", "زيادة الابتكار", "زيادة الموارد", "زيادة الكفاءة"], correct: 0, explanation: "الخطط المؤسسية يجب أن تدعم الخطط القطاعية.", characteristics: "تضارب السياسات، هدر الموارد.", treatment: "مواءمة الأهداف مع الاستراتيجية القطاعية." },
            { text: "لم يقم الفريق بتحليل الوضع الحالي قبل كتابة الخطة. ما الخطأ؟", options: ["غياب التشخيص الاستراتيجي", "زيادة الابتكار", "زيادة التمويل", "زيادة المرونة"], correct: 0, explanation: "لا يمكن التخطيط للمستقبل دون فهم الوضع الحالي.", characteristics: "ضعف التحليل، أهداف غير دقيقة.", treatment: "إجراء تحليل بيئي شامل." },
            { text: "كل مؤسسة تستخدم تعريفاً مختلفاً لكلمة (مؤشر أداء). ما المشكلة؟", options: ["غياب لغة التخطيط الموحدة", "زيادة الابتكار", "زيادة المرونة", "زيادة التمويل"], correct: 0, explanation: "توحيد المصطلحات ضروري لتجميع الخطط الوطنية.", characteristics: "ارتباك مفاهيمي، صعوبة المقارنة.", treatment: "وضع دليل مصطلحات وطني." },
            { text: "استخدمت المؤسسة بيانات عمرها خمس سنوات. ما الخطر؟", options: ["تحليل غير دقيق للوضع الحالي", "زيادة الابتكار", "زيادة التمويل", "زيادة الكفاءة"], correct: 0, explanation: "البيانات القديمة قد لا تعكس الواقع.", characteristics: "فجوة معلوماتية، قرارات غير دقيقة.", treatment: "تحديث قواعد البيانات دورياً." },
            { text: "لم تتضمن الخطة جدولاً زمنياً لتنفيذ الأهداف. ما النتيجة؟", options: ["صعوبة متابعة التنفيذ", "زيادة الابتكار", "زيادة التمويل", "زيادة المرونة"], correct: 0, explanation: "الجدول الزمن ضروري لتنظيم التنفيذ.", characteristics: "تأخير التنفيذ، ضعف المتابعة.", treatment: "ربط الأهداف بإطار زمني." },
            { text: "لم تمت مراجعة الخطة رغم تغير الظروف الاقتصادية العالمية. ما المشكلة؟", options: ["غياب المرونة الاستراتيجية", "زيادة الاستقرار", "زيادة الابتكار", "زيادة الموارد"], correct: 0, explanation: "الاستراتيجيات يجب أن تكون مرنة.", characteristics: "جمود التخطيط، تأخر الاستجابة.", treatment: "إجراء مراجعات دورية." },
            { text: "وضعت المؤسسة 120 مؤشر أداء في الخطة. ما المشكلة؟", options: ["تعقيد نظام المتابعة", "زيادة الجودة", "زيادة الابتكار", "زيادة التمويل"], correct: 0, explanation: "كثرة المؤشرات تربك المتابعة.", characteristics: "تشتيت التركيز، تعقيد التقارير.", treatment: "التركيز على مؤشرات رئيسية." },
            { text: "لم يتم ربط المبادرات الاستراتيجية بالموازنة. ما المشكلة؟", options: ["ضعف قابلية التنفيذ", "زيادة الابتكار", "زيادة المرونة", "زيادة المشاركة"], correct: 0, explanation: "الاستراتيجية يجب أن ترتبط بالموازنة.", characteristics: "فجوة مالية، مشاريع غير ممولة.", treatment: "مواءمة الخطة مع الموازنة." },
            { text: "لم يتم تحليل أصحاب المصلحة عند إعداد الخطة. ما الخطر؟", options: ["ضعف قبول الاستراتيجية", "زيادة التمويل", "زيادة الابتكار", "زيادة الكفاءة"], correct: 0, explanation: "تحليل أصحاب المصلحة يضمن الدعم المؤسسي.", characteristics: "مقاومة خارجية، نقص الدعم.", treatment: "إجراء تحليل Stakeholders." },
            { text: "لم يتم ربط مؤشرات الأداء بالأهداف الاستراتيجية. ما المشكلة؟", options: ["ضعف نظام المتابعة", "زيادة الابتكار", "زيادة الموارد", "زيادة الكفاءة"], correct: 0, explanation: "المؤشرات يجب أن تقيس تحقيق الأهداف.", characteristics: "تشويش إداري، مؤشرات غير مفيدة.", treatment: "ربط كل مؤشر بهدف." },
            { text: "لم يتم تقييم الخطة السابقة قبل إعداد الخطة الجديدة. ما الخلل؟", options: ["غياب التعلم المؤسسي", "زيادة الابتكار", "زيادة التمويل", "زيادة المرونة"], correct: 0, explanation: "تقييم التجارب السابقة ضروري للتحسين.", characteristics: "تكرار الأخطاء، ضعف التطوير.", treatment: "إجراء تقييم للخطة السابقة." },
            { text: "ما الهدف الأساسي من مؤشرات الأداء؟", options: ["قياس تحقيق الأهداف", "زيادة التمويل", "زيادة الابتكار", "تقليل المشاركة"], correct: 0, explanation: "المؤشرات تساعد في قياس التقدم.", characteristics: "تحسين القرار، تعزيز المساءلة.", treatment: "اختيار مؤشرات واضحة." }
            // ملاحظة: يمكنك إضافة باقي الـ 50 سؤالاً هنا بنفس النمط
        ];

        let questions = [];
        let currentIdx = 0;
        let score = 0;
        let answered = false;

        // دالة لخلط المصفوفات (Fisher-Yates Shuffle)
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function initQuiz() {
            // خلط الأسئلة
            questions = shuffle([...rawQuestions]);
            document.getElementById('total-count').innerText = questions.length;
            loadQuestion();
        }

        function loadQuestion() {
            answered = false;
            document.getElementById('nextBtn').disabled = true;
            const q = questions[currentIdx];
            
            // حفظ النص الصحيح قبل الخلط
            const correctText = q.options[q.correct];
            // خلط الخيارات
            const shuffledOptions = shuffle([...q.options]);
            // إيجاد المعامل الجديد للاجابة الصحيحة
            const newCorrectIdx = shuffledOptions.indexOf(correctText);

            let html = `
                <div class="question-card">
                    <div class="question-text">${q.text}</div>
                    <div class="options-grid">
                        ${shuffledOptions.map((opt, i) => `
                            <div class="option" onclick="checkAnswer(${i}, ${newCorrectIdx}, this)">${opt}</div>
                        `).join('')}
                    </div>
                    <div class="explanation-box" id="exp">
                        <strong>التفسير:</strong> ${q.explanation}<br>
                        <small>الخصائص: ${q.characteristics}</small><br>
                        <span class="treatment-tag">العلاج: ${q.treatment}</span>
                    </div>
                </div>
            `;
            document.getElementById('quiz-content').innerHTML = html;
            document.getElementById('current-idx').innerText = currentIdx + 1;
            document.getElementById('progress').style.width = ((currentIdx + 1) / questions.length * 100) + '%';
        }

        function checkAnswer(idx, correctIdx, el) {
            if (answered) return;
            answered = true;
            const options = document.querySelectorAll('.option');
            
            if (idx === correctIdx) {
                el.classList.add('correct');
                score++;
                document.getElementById('score').innerText = score;
            } else {
                el.classList.add('incorrect');
                options[correctIdx].classList.add('correct');
            }
            
            document.getElementById('exp').style.display = 'block';
            document.getElementById('nextBtn').disabled = false;
        }

        function handleNext() {
            currentIdx++;
            if (currentIdx < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            document.getElementById('final-score').innerText = score + " / " + questions.length;
            document.getElementById('final-msg').innerText = score >= (questions.length/2) ? "ممتاز! لديك خلفية استراتيجية قوية." : "تحتاج لمراجعة أدوات التخطيط والمواءمة.";
        }

        initQuiz();
    </script>
</body>
</html>
